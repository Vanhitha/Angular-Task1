<div class="d-flex justify-content-center align-items-center vh-100"
     style="background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb); min-height:100vh;">
  
  <div class="card shadow rounded-4 p-4" style="max-width: 400px; width: 100%;">
    
    <h3 class="text-center fw-bold mb-4"
        style=" -webkit-background-clip: text;">
      Forgot Password
    </h3>

    <form (ngSubmit)="forgotPassword()">

      
      <div class="mb-3">
        <label class="form-label fw-semibold text-primary">Email address</label>
        <input 
          type="email" 
          class="form-control"
          placeholder="Enter your email"
          [(ngModel)]="email" 
          name="email" 
          required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold text-primary">New Password</label>
        <input 
          type="password" 
          class="form-control"
          placeholder="Enter new password"
          [(ngModel)]="newPassword" 
          name="newPassword" 
          required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold text-primary">Confirm Password</label>
        <input 
          type="password" 
          class="form-control"
          placeholder="Confirm password"
          [(ngModel)]="confirmPassword" 
          name="confirmPassword" 
          required>
      </div>

      <button type="submit" class="btn btn-gradient w-100 mb-3">
        Reset Password
      </button>

    </form>

    <p class="text-center">
      Remember your password?
      <a routerLink="/login" class="text-black text-decoration-none">Login</a>
    </p>

  </div>
</div>
