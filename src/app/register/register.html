<div class="d-flex justify-content-center align-items-center vh-100"
     style="background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb); min-height:100vh;">
  <div class="card shadow rounded-4 p-4" style="max-width: 400px; width: 100%;">
    <h3 class="text-center fw-bold mb-4"
        style=" -webkit-background-clip: text; background-clip: text;">
      Register
    </h3>

    <form (ngSubmit)="registerUser()">
      <div class="mb-3">
        <label for="fullname" class="form-label fw-semibold text-primary">Full Name</label>
        <input type="text" class="form-control" id="fullname" placeholder="Enter full name" [(ngModel)]="fullname" name="fullname" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label fw-semibold text-primary">Email address</label>
        <input type="email" class="form-control" id="email" placeholder="Enter email" [(ngModel)]="email" name="email" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label fw-semibold text-primary">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Password" [(ngModel)]="password" name="password" required>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label fw-semibold text-primary">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" [(ngModel)]="confirmPassword" name="confirmPassword" required>
      </div>

      <button type="submit" class="btn btn-gradient w-100 mb-3">Register</button>
    </form>

    <p class="text-center">
      Already have an account?
      <a routerLink="/login" class="text-black text-decoration-none">Login</a>
    </p>
  </div>
</div>
<router-outlet></router-outlet>
